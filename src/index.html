<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <link rel="stylesheet" href="style.css">
 <meta charset="UTF-8">
 <title>Lista de Tarefas</title>
 <style>
    body { text-align: center;}
 </style>
</head>
<body>
 <h1>Minhas Tarefas</h1>

 <div class="input-container">
     <input type="text" id="taskInput" placeholder="Digite uma tarefa...">
     <button id="addBtn">Adicionar</button>
   </div>

   <div class="filters">
     <button class="filter-btn active" id="showTodas" data-filter="todas">Todas</button>
     <button class="filter-btn" id="showAtivas" data-filter="ativas">Ativas</button>
     <button class="filter-btn" id="showConcluidas" data-filter="concluidas">Concluídas</button>
   </div>
 
 <ul id="taskList">

 </ul>

 <script src="script.js"></script>
</body>
</html>
